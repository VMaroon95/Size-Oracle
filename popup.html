<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Size Oracle</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">

    <!-- Setup / Measurements View (always shown when popup opens) -->
    <div id="setup-view" class="setup-view">
      <header>
        <h1 id="header-title">Size Oracle</h1>
        <p class="subtitle">Universal Size Advisor</p>
        <p class="stat">Supporting 100+ stores</p>
      </header>

      <div id="status" class="status">No profile yet</div>

      <!-- Profile Selector -->
      <div class="profile-selector">
        <label class="profile-label">Profile</label>
        <div class="profile-row">
          <select id="profile-select" class="profile-dropdown"></select>
          <button id="add-profile-btn" class="btn-icon" title="Add Profile">+</button>
          <button id="delete-profile-btn" class="btn-icon btn-icon--danger" title="Delete Profile">✕</button>
        </div>
      </div>

      <!-- New Profile Name (hidden by default) -->
      <div id="new-profile-row" class="new-profile-row" style="display:none;">
        <input type="text" id="new-profile-name" placeholder="Profile name (e.g. Partner, Kid)" maxlength="20">
        <button id="confirm-new-profile" class="btn btn--small">Create</button>
        <button id="cancel-new-profile" class="btn btn--small btn--secondary">Cancel</button>
      </div>

      <!-- Unit Toggle -->
      <div class="toggle-row">
        <button id="btn-inches" class="toggle-btn toggle-btn--active" data-unit="in">Inches</button>
        <button id="btn-cm" class="toggle-btn" data-unit="cm">CM</button>
      </div>

      <!-- Gender Selector -->
      <div class="toggle-row">
        <button id="btn-mens" class="toggle-btn toggle-btn--active" data-gender="mens">Men's</button>
        <button id="btn-womens" class="toggle-btn" data-gender="womens">Women's</button>
      </div>

      <!-- Fit Preference -->
      <div class="toggle-row">
        <button class="toggle-btn fit-btn" data-fit="fitted">Fitted</button>
        <button class="toggle-btn fit-btn toggle-btn--active" data-fit="regular">Regular</button>
        <button class="toggle-btn fit-btn" data-fit="relaxed">Relaxed</button>
      </div>

      <!-- Body Measurements -->
      <div class="section-label">Body Measurements</div>
      <div class="inputs">
        <div class="input-group">
          <label for="chest">Chest <span class="unit-label">(in)</span></label>
          <input type="number" id="chest" step="0.5" min="0" placeholder="e.g. 40">
        </div>
        <div class="input-group">
          <label for="waist">Waist <span class="unit-label">(in)</span></label>
          <input type="number" id="waist" step="0.5" min="0" placeholder="e.g. 34">
        </div>
        <div class="input-group">
          <label for="hips">Hips <span class="unit-label">(in)</span></label>
          <input type="number" id="hips" step="0.5" min="0" placeholder="e.g. 40">
        </div>
        <div class="input-group">
          <label for="inseam">Inseam <span class="unit-label">(in)</span></label>
          <input type="number" id="inseam" step="0.5" min="0" placeholder="e.g. 32">
        </div>
      </div>

      <!-- Shoe Size -->
      <div class="section-label">Shoe Size</div>
      <div class="inputs shoe-inputs">
        <div class="input-group">
          <label for="shoe-size">Size</label>
          <input type="number" id="shoe-size" step="0.5" min="1" max="20" placeholder="e.g. 10">
        </div>
        <div class="input-group">
          <label for="shoe-system">System</label>
          <select id="shoe-system" class="select-input">
            <option value="us">US</option>
            <option value="uk">UK</option>
            <option value="eu">EU</option>
          </select>
        </div>
      </div>

      <!-- Actions -->
      <div class="actions">
        <button id="save-btn" class="btn btn--primary">Save Profile</button>
        <button id="clear-btn" class="btn btn--secondary">Clear</button>
      </div>

      <footer>
        <p>All data stored locally. Nothing leaves your device.</p>
      </footer>
    </div>

  </div>

  <script src="popup.js"></script>
</body>
</html>
